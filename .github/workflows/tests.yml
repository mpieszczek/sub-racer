name: Tests

on:
  push:
    paths:
      - 'src/**'
      - 'test/**'
      - 'CMakeLists.txt'
      - 'test/CMakeLists.txt'
  pull_request:
    paths:
      - 'src/**'
      - 'test/**'
      - 'CMakeLists.txt'
      - 'test/CMakeLists.txt'

jobs:
  test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: >-
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-gcc

    - name: Configure CMake
      run: |
        cmake -B build -G "MinGW Makefiles"

    - name: Build
      run: |
        cmake --build build --target sub-racer-tests

    - name: Run tests
      run: |
        ./build/test/sub-racer-tests.exe

  test-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libgl1-mesa-dev

    - name: Configure CMake
      run: |
        cmake -B build

    - name: Build
      run: |
        cmake --build build --target sub-racer-tests

    - name: Run tests
      run: |
        ./build/test/sub-racer-tests

  test-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install cmake

    - name: Configure CMake
      run: |
        cmake -B build

    - name: Build
      run: |
        cmake --build build --target sub-racer-tests

    - name: Run tests
      run: |
        ./build/test/sub-racer-tests
